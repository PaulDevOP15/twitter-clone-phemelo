<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <title>Join X — Twitter Clone</title>
</head>
<body class="auth-landing">
    <div class="auth-shell">
        <div class="auth-brand">
            <svg class="auth-logo" viewBox="0 0 24 24" aria-hidden="true" role="img">
                <title>X</title>
                <path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"></path>
            </svg>
        </div>

        <div class="auth-panel">
            <h1 class="auth-heading">Happening now</h1>
            <h2 class="auth-subheading">Join today.</h2>

            <div class="auth-stack">
                <a class="auth-btn auth-btn--outline" href="index.html">
                    <svg class="auth-btn-icon auth-btn-icon--google" viewBox="0 0 48 48" aria-hidden="true">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.21 17.74 9.5 24 9.5z"></path>

                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.71-13.47-8.98l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                    </svg>
                    Sign up with Google
                </a>
                <a class="auth-btn auth-btn--outline" href="index.html">
                    <svg class="auth-btn-icon auth-btn-icon--apple" viewBox="0 0 814 1000" aria-hidden="true">
                        <path fill="currentColor" d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-86.5-40.2-165.9-40.2c-79.1 0-105.6 41.4-169.2 41.4-63.5 0-113-92.9-158.1-164.4C89.5 929.4 26.4 799.2 26.4 677.5c0-193.8 125.9-296.1 250.2-296.1 79.1 0 145 52.2 194.6 52.2 48.4 0 124-55.6 209.2-55.6 33.5 0 153.6 3.1 255.7 63.8zM554.1 153.8c42.4-51.1 72.2-122.2 72.2-193.8 0-9.9-.9-19.8-2.7-28.2-67.3 2.7-149.2 44.8-197.8 101.4-38.9 44.8-74.9 115.3-74.9 187.5 0 9.9.9 19.8 2.7 28.2 7.7 0 15.6-.9 23.4-2.7 66.6-9 132.5-45 174.1-92.4z"></path>
                    </svg>
                    Sign up with Apple
                </a>

                <p class="auth-or">OR</p>

                <a class="auth-btn auth-btn--primary" href="index.html">Create account</a>
            </div>

            <p class="auth-legal">
                By signing up, you agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>, including <a href="#">Cookie Use</a>.
            </p>

            <p class="auth-section-label">Already have an account?</p>
            <div class="auth-stack">
                <a class="auth-btn auth-btn--outline-black" href="index.html">Sign in</a>
                <a class="auth-btn auth-btn--outline auth-grok" href="index.html">
                    <span class="material-icons auth-btn-icon" aria-hidden="true">auto_awesome</span>
                    Get Grok
                </a>
            </div>
        </div>
    </div>
</body>
</html>
